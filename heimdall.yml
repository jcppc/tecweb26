networks:
  traefik:
    external: true

volumes:
  heimdall-data:
      name: heimdall-data
     
services:
  heimdall:
    image: linuxserver/heimdall:latest
    container_name: heimdall
    hostname: heimdall

    labels:
      # Enable Traefik
      - traefik.enable=true
      
      # Router
      - traefik.http.routers.heimdall.rule=Host(`www.tecweb26.com`)
      - traefik.http.routers.heimdall.entrypoints=websecure
      - traefik.http.routers.heimdall.tls=true
      - traefik.http.routers.heimdall.tls.certresolver=le

      # Service
      - traefik.http.services.heimdall.loadbalancer.server.port=80

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - heimdall-data:/config
 
    restart: unless-stopped
    
    networks:
      - traefik
    

    
