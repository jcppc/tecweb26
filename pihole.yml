networks:
  traefik:
    external: true

volumes:
  etc-pihole: {}
  etc-dnsmasq.d: {}
  
services:

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    hostname: pihole
    
    environment:
      TZ: "Europe/Lisbon"
      WEBPASSWORD: "password"
      DNSMASQ_LISTENING: "all"

    volumes:
      - etc-pihole:/etc/pihole
      - etc-dnsmasq.d:/etc/dnsmasq.d

    # DNS must be exposed directly
    ports:
      - "53:53/tcp"
      - "53:53/udp"

    labels:
      - "traefik.enable=true"

      # HTTP → HTTPS
      - "traefik.http.routers.pihole.rule=Host(`dns.tecweb26.com`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.routers.pihole.tls.certresolver=le"
      - "traefik.http.middlewares.pihole-redirect.redirectregex.regex=^https://dns.tecweb26.com/$"
      - "traefik.http.middlewares.pihole-redirect.redirectregex.replacement=https://dns.tecweb26.com/admin"
      - "traefik.http.routers.pihole.middlewares=pihole-redirect"

    networks:
      - traefik

    cap_add:
      - NET_ADMIN
      